<!DOCTYPE html>
<html>
<head>
    <title>Rubrica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/css/bootstrap.min.css" rel="stylesheet">


<style>

.card-body{
height: 300px;
width: 600px;
    color:lime;
    font-weight: 700;
    border: 9px solid red;
    border-radius: 20px;
}


.card-body:hover{

    color: darkgreen;
    text-shadow: 6px 10px 12px yellowgreen, -6px 102px -12px yellow;
    font-weight: 700;
}

body{
    background-color: aquamarine;
}


</style>














</head>
<body>

<div class="container">
    <!-- LOGIN -->
    <div id="login">
        <div class="card mx-auto" style="max-width: 400px; margin-top: 100px;">
            <div class="card-body text-center">
                <h2>📱 Rubrica</h2>
                <p>Inserisci PIN:</p>
                <input type="password" id="pin" class="form-control mb-3" maxlength="4" placeholder="1234">
                <button class="btn btn-success w-100" onclick="entra()">ENTRA</button>
                <br><small>PIN: 1234</small>
            </div>
        </div>
    </div>

    <!-- PRINCIPALE -->
    <div id="principale" style="display: none;">
        <div class="card mx-auto" style="max-width: 800px;">
            <div class="card-header bg-primary text-white">
                <h3>Rubrica <button class="btn btn-sm float-end" onclick="esci()">ESCI</button></h3>
            </div>
            <div class="card-body">
                <!-- AGGIUNGI -->
                <div class="row mb-4">
                    <div class="col-5">
                        <input type="text" id="nome" class="form-control" placeholder="Nome">
                    </div>
                    <div class="col-5">
                        <input type="text" id="tel" class="form-control" placeholder="Telefono">
                    </div>
                    <div class="col-2">
                        <button class="btn btn-success w-100" onclick="aggiungi()">+</button>
                    </div>
                </div>

                <!-- LISTA -->
                <div id="lista"></div>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
